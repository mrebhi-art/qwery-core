version: "3.9"

services:
  neo4j:
    image: neo4j:5.26
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpass
    volumes:
      - neo4j-data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - SERVER_API_URL=http://nginx:80/api

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    expose:
      - "4096"
    volumes:
      - server-storage:/app/data
    environment:
      - PORT=4096
      - HOSTNAME=0.0.0.0
      - QWERY_MCP_SERVER_URL=http://localhost:4096/mcp
      - AZURE_API_KEY=
      - AZURE_RESOURCE_NAME=
      - AZURE_OPENAI_DEPLOYMENT=
      - ANTHROPIC_API_KEY=
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpass
    depends_on:
      - neo4j

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - server

volumes:
  server-storage:
  neo4j-data:
